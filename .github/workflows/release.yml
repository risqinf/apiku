name: Release

# Trigger on either:
#   - pushing a tag that looks like v1.2.3
#   - manual dispatch from the Actions tab (input: tag name)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        default: 'v0.0.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: apiku

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: false
          # Linux musl x86_64 (static, portable)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          # macOS Intel (cross-compiled from Apple Silicon runner — much
          # shorter queue than dedicated Intel macos-13 runners)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
          # Windows MSVC x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
          # Windows MSVC ARM64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux non-x86_64)
        if: matrix.cross && runner.os == 'Linux'
        run: |
          cargo install cross --locked
          echo "USE_CROSS=1" >> "$GITHUB_ENV"

      - name: Build (cross)
        if: env.USE_CROSS == '1'
        shell: bash
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (cargo, native)
        if: env.USE_CROSS != '1'
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Strip binary
        if: runner.os != 'Windows' && !matrix.cross && matrix.target != 'x86_64-apple-darwin'
        shell: bash
        run: |
          strip "target/${{ matrix.target }}/release/${BIN_NAME}" || true

      - name: Stage release files
        id: stage
        shell: bash
        run: |
          STAGE="${BIN_NAME}-${{ steps.tag.outputs.name }}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"

          BIN_SRC="target/${{ matrix.target }}/release/${BIN_NAME}"
          BIN_DST="dist/${STAGE}/${BIN_NAME}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            BIN_SRC="${BIN_SRC}.exe"
            BIN_DST="${BIN_DST}.exe"
          fi

          cp "${BIN_SRC}" "${BIN_DST}"
          [[ -f README.md ]] && cp README.md "dist/${STAGE}/" || true
          [[ -f LICENSE   ]] && cp LICENSE   "dist/${STAGE}/" || true
          [[ -f config.toml ]] && cp config.toml "dist/${STAGE}/" || true

          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ARCHIVE="${STAGE}.zip"
            if command -v 7z >/dev/null 2>&1; then
              7z a -tzip "${ARCHIVE}" "${STAGE}" >/dev/null
            else
              powershell -Command "Compress-Archive -Path '${STAGE}' -DestinationPath '${ARCHIVE}'"
            fi
          else
            ARCHIVE="${STAGE}.tar.gz"
            tar -czf "${ARCHIVE}" "${STAGE}"
          fi

          # SHA-256 checksum (portable: try multiple tools)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            powershell -Command "(Get-FileHash -Algorithm SHA256 '${ARCHIVE}').Hash.ToLower() + '  ${ARCHIVE}'" > "${ARCHIVE}.sha256"
          fi

          echo "archive=dist/${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${ARCHIVE}.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and combine checksums
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} release/ \;
          # Combined checksum file with "<sha256>  <filename>" lines
          (cd release && sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true)
          ls -la release

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS
